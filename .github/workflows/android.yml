name: Build Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build MiniDebug APK
      run: ./gradlew assembleMiniDebug

    - name: Build Release APKs (unsigned)
      run: ./gradlew assembleRelease
      
    - name: Upload MiniDebug APK
      uses: actions/upload-artifact@v4
      with:
        name: outputs-apk-minidebug
        path: app/build/outputs/apk/miniDebug

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: outputs-apk-release
        path: app/build/outputs/apk/release
