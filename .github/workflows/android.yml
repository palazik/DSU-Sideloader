name: Build Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Download Gradle wrapper jar
      run: |
        curl -L https://github.com/gradle/gradle/raw/v8.14.0/gradle/wrapper/gradle-wrapper.jar \
          -o gradle/wrapper/gradle-wrapper.jar

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK and CMake
      run: sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

    - name: Build MiniDebug APK
      run: ./gradlew assembleMiniDebug

    - name: Build Release APKs (unsigned)
      run: ./gradlew assembleRelease

    - name: Upload MiniDebug APK
      uses: actions/upload-artifact@v4
      with:
        name: outputs-apk-minidebug
        path: app/build/outputs/apk/miniDebug

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: outputs-apk-release
        path: app/build/outputs/apk/release
